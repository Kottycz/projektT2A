<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upravit recept – Kottyho kuchařka</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="assets/images/logo2.png" alt="Logo" class="logo-img">
            <a href="index.html" class="logo-link">
                <h1>Kottyho kuchařka</h1>
            </a>
        </div>
        <nav class="navigation">
            <ul>
                <li><a href="recepty.html">Recepty</a></li>
                <li><a href="oblibene.html">Oblíbené</a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
                <li><a href="o-nas.html">O nás</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="add-recipe-container">
            <h1>Upravit recept</h1>
            <div id="errors" style="display:none;background:#fff0ee;border:1px solid #e26a2c;border-radius:8px;padding:16px;margin-bottom:24px;"></div>

            <form class="recipe-form" id="edit-form">
                <fieldset>
                    <legend>Základní informace</legend>

                    <label for="name">Název receptu *</label>
                    <input type="text" id="name" name="name" required>

                    <label for="description">Popis</label>
                    <textarea id="description" name="description"></textarea>

                    <label for="image">Cesta k obrázku</label>
                    <input type="text" id="image" name="image" placeholder="assets/images/nazev.jpg">
                    <small id="image-current" style="color:#888;"></small>

                    <div class="form-two-col">
                        <div>
                            <label for="category_id">Kategorie *</label>
                            <select id="category_id" name="category_id" required></select>
                        </div>
                        <div>
                            <label for="difficulty_id">Obtížnost *</label>
                            <select id="difficulty_id" name="difficulty_id" required></select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div>
                            <label for="prep_time">Příprava (min) *</label>
                            <input type="number" id="prep_time" name="prep_time" min="0" max="600" required>
                        </div>
                        <div>
                            <label for="cook_time">Vaření (min) *</label>
                            <input type="number" id="cook_time" name="cook_time" min="0" max="600" required>
                        </div>
                        <div>
                            <label for="servings">Porcí *</label>
                            <input type="number" id="servings" name="servings" min="1" max="50" required>
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Ingredience a postup</legend>

                    <label for="ingredients">Ingredience <small>(každá na nový řádek)</small></label>
                    <textarea id="ingredients" name="ingredients" rows="10"></textarea>

                    <label for="steps">Postup přípravy <small>(každý krok na nový řádek)</small></label>
                    <textarea id="steps" name="steps" rows="10"></textarea>
                </fieldset>

                <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
                    <button type="submit" class="btn-submit">Uložit změny</button>
                    <a id="cancel-link" href="recepty.html" class="btn-secondary" style="align-self:center;">← Zrušit</a>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Kottyho kuchařka</p>
    </footer>

    <script>
        const slug = new URLSearchParams(location.search).get('slug') ?? '';
        let csrfToken = '';

        if (!slug) {
            location.href = 'recepty.html';
        }

        document.getElementById('cancel-link').href = 'recept.html?slug=' + encodeURIComponent(slug);

        Promise.all([
            fetch('php/api/recept.php?slug=' + encodeURIComponent(slug)).then(r => r.json()),
            fetch('php/api/meta.php').then(r => r.json()),
            fetch('php/api/csrf.php').then(r => r.json()),
        ]).then(([recipe, meta, csrf]) => {
            if (recipe.error) { location.href = 'recepty.html'; return; }

            csrfToken = csrf.token;

            document.title = 'Upravit: ' + recipe.name + ' – Kottyho kuchařka';
            document.getElementById('name').value        = recipe.name;
            document.getElementById('description').value = recipe.description;
            document.getElementById('image').value       = recipe.image;
            document.getElementById('image-current').textContent = 'Aktuální: ' + recipe.image;
            document.getElementById('prep_time').value   = recipe.prepTime;
            document.getElementById('cook_time').value   = recipe.cookTime;
            document.getElementById('servings').value    = recipe.servings;

            const ingText = recipe.ingredients.map(i =>
                (i.amount ? i.amount + ' ' : '') + i.name + (i.note ? ' (' + i.note + ')' : '')
            ).join('\n');
            document.getElementById('ingredients').value = ingText;
            document.getElementById('steps').value = recipe.steps.join('\n');

            const catSel  = document.getElementById('category_id');
            const diffSel = document.getElementById('difficulty_id');

            meta.categories.forEach(c => {
                const opt = new Option(c.name, c.id, false, c.id === recipe.categoryId);
                catSel.add(opt);
            });
            meta.difficulties.forEach(d => {
                const opt = new Option(d.name, d.id, false, d.id === recipe.difficultyId);
                diffSel.add(opt);
            });
        });

        document.getElementById('edit-form').addEventListener('submit', async e => {
            e.preventDefault();
            const form  = e.target;
            const body  = new URLSearchParams(new FormData(form));
            body.set('csrf_token', csrfToken);
            body.set('slug', slug);

            const res  = await fetch('php/api/upravit-recept.php', { method: 'POST', body });
            const data = await res.json();

            if (data.errors) {
                const errDiv = document.getElementById('errors');
                errDiv.style.display = '';
                errDiv.innerHTML = '<p style="margin:0 0 8px;font-weight:600;">Opravte prosím chyby:</p><ul style="margin:0;padding-left:20px;">'
                    + data.errors.map(e => `<li>${e}</li>`).join('') + '</ul>';
                return;
            }

            location.href = 'recept.html?slug=' + encodeURIComponent(data.slug);
        });
    </script>

</body>
</html>
