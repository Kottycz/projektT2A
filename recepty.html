<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepty – Kottyho kuchařka</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="assets/images/logo2.png" alt="Logo" class="logo-img">
            <a href="index.html" class="logo-link">
                <h1>Kottyho kuchařka</h1>
            </a>
        </div>
        <nav class="navigation">
            <ul>
                <li><a href="recepty.html">Recepty</a></li>
                <li><a href="oblibene.html">Oblíbené <span id="fav-badge" class="header__favorites-badge" style="display:none;"></span></a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
                <li><a href="o-nas.html">O nás</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="category-header">
            <h1>Všechny recepty</h1>
            <p>Najděte si svůj oblíbený pokrm.</p>
        </section>
        <section class="recipes-grid" id="recipes-grid">
            <p>Načítám recepty…</p>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Kottyho kuchařka</p>
    </footer>

    <script>
        fetch('php/api/recepty.php')
            .then(r => r.json())
            .then(recipes => {
                const grid = document.getElementById('recipes-grid');
                if (recipes.length === 0) {
                    grid.innerHTML = '<p>Zatím tu nejsou žádné recepty.</p>';
                    return;
                }
                grid.innerHTML = recipes.map(r =>
                    `<a href="recept.html?slug=${encodeURIComponent(r.slug)}" class="recipe-card-link">
                        <article class="recipe-card">
                            <img src="${r.image}" alt="${r.name}">
                            <div class="recipe-content">
                                <h3>${r.name}</h3>
                                <p>${r.description}</p>
                                <div class="recipe-meta">
                                    <span>⏱ ${r.totalTime}</span>
                                    <span>👥 ${r.servings} porcí</span>
                                    <span>⭐ ${r.difficulty ?? ''}</span>
                                </div>
                            </div>
                        </article>
                    </a>`
                ).join('');
            });

        fetch('php/api/oblibene.php')
            .then(r => r.json())
            .then(data => {
                if (data.count > 0) {
                    const badge = document.getElementById('fav-badge');
                    badge.textContent = data.count;
                    badge.style.display = '';
                }
            });
    </script>

</body>
</html>
