<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategorie receptů – Kottyho kuchařka</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="assets/images/logo2.png" alt="Logo" class="logo-img">
            <a href="index.html" class="logo-link">
                <h1>Kottyho kuchařka</h1>
            </a>
        </div>
        <nav class="navigation">
            <ul>
                <li><a href="recepty.html">Recepty</a></li>
                <li><a href="oblibene.html">Oblíbené <span id="fav-badge" class="header__favorites-badge" style="display:none;"></span></a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
                <li><a href="o-nas.html">O nás</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="category-header">
            <h1>Kategorie receptů</h1>
            <p>Vyberte si kategorii a nechte se inspirovat.</p>
        </section>
        <section class="recipe-categories">
            <div class="recipe-categories-inner">
                <div class="recipe-categories-grid" id="categories-grid">
                    <p>Načítám kategorie…</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Kottyho kuchařka</p>
    </footer>

    <script>
        fetch('php/api/kategorie.php')
            .then(r => r.json())
            .then(cats => {
                document.getElementById('categories-grid').innerHTML = cats.map(c =>
                    `<a href="kategorie.html?slug=${encodeURIComponent(c.slug)}" class="recipe-category">
                        <img src="${c.image}" alt="${c.name}">
                        <span>${c.name}</span>
                    </a>`
                ).join('');
            });

        fetch('php/api/oblibene.php')
            .then(r => r.json())
            .then(data => {
                if (data.count > 0) {
                    const badge = document.getElementById('fav-badge');
                    badge.textContent = data.count;
                    badge.style.display = '';
                }
            });
    </script>

</body>
</html>
