<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategorie – Kottyho kuchařka</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="assets/images/logo2.png" alt="Logo" class="logo-img">
            <a href="index.html" class="logo-link">
                <h1>Kottyho kuchařka</h1>
            </a>
        </div>
        <nav class="navigation">
            <ul>
                <li><a href="recepty.html">Recepty</a></li>
                <li><a href="oblibene.html">Oblíbené <span id="fav-badge" class="header__favorites-badge" style="display:none;"></span></a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
                <li><a href="o-nas.html">O nás</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <p>Načítám…</p>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Kottyho kuchařka</p>
    </footer>

    <script>
        const slug = new URLSearchParams(location.search).get('slug') ?? '';

        if (!slug) {
            location.href = 'kategorie-receptu.html';
        } else {
            Promise.all([
                fetch('php/api/kategorie.php?slug=' + encodeURIComponent(slug)).then(r => r.json()),
                fetch('php/api/oblibene.php').then(r => r.json()),
            ]).then(([data, favData]) => {
                const badge = document.getElementById('fav-badge');
                if (favData.count > 0) {
                    badge.textContent = favData.count;
                    badge.style.display = '';
                }

                if (data.error) {
                    document.getElementById('main-content').innerHTML =
                        '<section class="category-header"><h1>Kategorie nenalezena</h1><p><a href="kategorie-receptu.html">Zpět na kategorie →</a></p></section>';
                    return;
                }

                document.title = data.category.name + ' – Kottyho kuchařka';

                const recipes = data.recipes.length
                    ? data.recipes.map(r =>
                        `<a href="recept.html?slug=${encodeURIComponent(r.slug)}" class="recipe-card-link">
                            <article class="recipe-card">
                                <img src="${r.image}" alt="${r.name}">
                                <div class="recipe-content">
                                    <h3>${r.name}</h3>
                                    <p>${r.description}</p>
                                    <div class="recipe-meta">
                                        <span>⏱ ${r.totalTime}</span>
                                        <span>👥 ${r.servings} porcí</span>
                                        <span>⭐ ${r.difficulty ?? ''}</span>
                                    </div>
                                </div>
                            </article>
                        </a>`
                    ).join('')
                    : '<p>V této kategorii zatím nejsou žádné recepty.</p>';

                document.getElementById('main-content').innerHTML = `
                    <section class="category-header">
                        <h1>${data.category.name}</h1>
                        ${data.category.description ? `<p>${data.category.description}</p>` : ''}
                    </section>
                    <section class="recipes-grid">${recipes}</section>`;
            });
        }
    </script>

</body>
</html>
