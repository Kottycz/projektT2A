<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oblíbené recepty – Kottyho kuchařka</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="assets/images/logo2.png" alt="Logo" class="logo-img">
            <a href="index.html" class="logo-link">
                <h1>Kottyho kuchařka</h1>
            </a>
        </div>
        <nav class="navigation">
            <ul>
                <li><a href="recepty.html">Recepty</a></li>
                <li><a href="oblibene.html">Oblíbené <span id="fav-badge" class="header__favorites-badge" style="display:none;"></span></a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
                <li><a href="o-nas.html">O nás</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="category-header">
            <h1>Oblíbené recepty</h1>
            <p>Tvoje nejoblíbenější kousky na jednom místě.</p>
        </section>
        <div id="favorites-content">
            <p>Načítám…</p>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Kottyho kuchařka</p>
    </footer>

    <script>
        let csrfToken = '';

        async function loadFavorites() {
            const res  = await fetch('php/api/oblibene.php');
            const data = await res.json();
            const cont = document.getElementById('favorites-content');
            const badge = document.getElementById('fav-badge');

            if (data.count > 0) {
                badge.textContent = data.count;
                badge.style.display = '';
            } else {
                badge.style.display = 'none';
            }

            if (data.recipes.length === 0) {
                cont.innerHTML = `<section class="category-header">
                    <p>Zatím nemáš žádné oblíbené recepty. <a href="recepty.html">Procházet recepty →</a></p>
                </section>`;
                return;
            }

            cont.innerHTML = `<section class="recipes-grid">
                ${data.recipes.map(r =>
                    `<article class="recipe-card">
                        <a href="recept.html?slug=${encodeURIComponent(r.slug)}">
                            <img src="${r.image}" alt="${r.name}">
                        </a>
                        <div class="recipe-content">
                            <a href="recept.html?slug=${encodeURIComponent(r.slug)}" style="text-decoration:none;color:inherit;">
                                <h3>${r.name}</h3>
                                <p>${r.description}</p>
                            </a>
                            <div class="recipe-meta">
                                <span>⏱ ${r.totalTime}</span>
                                <span>👥 ${r.servings} porcí</span>
                                <span>⭐ ${r.difficulty ?? ''}</span>
                            </div>
                            <button class="btn-remove-fav" data-id="${r.id}"
                                style="margin-top:16px;background:#e26a2c;color:#fff;border:none;padding:10px 24px;border-radius:50px;font-size:0.9rem;font-weight:600;cursor:pointer;width:100%;">
                                ♥ Odebrat z oblíbených
                            </button>
                        </div>
                    </article>`
                ).join('')}
            </section>`;

            document.querySelectorAll('.btn-remove-fav').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const body = new URLSearchParams({ csrf_token: csrfToken, recipe_id: btn.dataset.id });
                    await fetch('php/api/oblibene.php', { method: 'POST', body });
                    await loadFavorites();
                });
            });
        }

        fetch('php/api/csrf.php')
            .then(r => r.json())
            .then(data => { csrfToken = data.token; })
            .then(loadFavorites);
    </script>

</body>
</html>
