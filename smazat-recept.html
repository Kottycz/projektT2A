<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smazat recept – Kottyho kuchařka</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="assets/images/logo2.png" alt="Logo" class="logo-img">
            <a href="index.html" class="logo-link">
                <h1>Kottyho kuchařka</h1>
            </a>
        </div>
        <nav class="navigation">
            <ul>
                <li><a href="recepty.html">Recepty</a></li>
                <li><a href="oblibene.html">Oblíbené</a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
                <li><a href="o-nas.html">O nás</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="confirmation-container" style="max-width:600px;margin:60px auto;background:#fff;padding:50px 40px;border-radius:20px;box-shadow:0 8px 30px rgba(0,0,0,0.08);text-align:center;">
            <div id="confirm-content">
                <p>Načítám…</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Kottyho kuchařka</p>
    </footer>

    <script>
        const slug = new URLSearchParams(location.search).get('slug') ?? '';
        let csrfToken = '';

        if (!slug) { location.href = 'recepty.html'; }

        Promise.all([
            fetch('php/api/recept.php?slug=' + encodeURIComponent(slug)).then(r => r.json()),
            fetch('php/api/csrf.php').then(r => r.json()),
        ]).then(([recipe, csrf]) => {
            if (recipe.error) { location.href = 'recepty.html'; return; }

            csrfToken = csrf.token;
            document.title = 'Smazat: ' + recipe.name + ' – Kottyho kuchařka';

            document.getElementById('confirm-content').innerHTML = `
                <div style="font-size:3rem;margin-bottom:20px;">🗑️</div>
                <h1 style="font-size:1.8rem;margin-bottom:12px;color:#333;">Smazat recept?</h1>
                <p style="color:#666;margin-bottom:8px;">Opravdu chceš trvale smazat recept:</p>
                <p style="font-size:1.3rem;font-weight:700;color:#e26a2c;margin-bottom:32px;">${recipe.name}</p>
                <p style="color:#999;font-size:0.9rem;margin-bottom:32px;">Tato akce je nevratná. Recept, jeho ingredience a postup budou odstraněny.</p>
                <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
                    <button id="btn-delete"
                        style="background:#d32f2f;color:#fff;border:none;padding:14px 36px;border-radius:50px;font-size:1rem;font-weight:600;cursor:pointer;transition:background 0.3s;">
                        Ano, smazat
                    </button>
                    <a href="recept.html?slug=${encodeURIComponent(recipe.slug)}"
                        style="background:#fff;color:#333;border:2px solid #ddd;padding:12px 36px;border-radius:50px;font-size:1rem;font-weight:600;text-decoration:none;align-self:center;transition:border-color 0.3s;">
                        ← Zrušit
                    </a>
                </div>`;

            document.getElementById('btn-delete').addEventListener('click', async () => {
                const body = new URLSearchParams({ csrf_token: csrfToken, slug });
                await fetch('php/api/smazat-recept.php', { method: 'POST', body });
                location.href = 'recepty.html';
            });
        });
    </script>

</body>
</html>
