<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vyhledávání – Kottyho kuchařka</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="assets/images/logo2.png" alt="Logo" class="logo-img">
            <a href="index.html" class="logo-link">
                <h1>Kottyho kuchařka</h1>
            </a>
        </div>
        <nav class="navigation">
            <ul>
                <li><a href="recepty.html">Recepty</a></li>
                <li><a href="oblibene.html">Oblíbené <span id="fav-badge" class="header__favorites-badge" style="display:none;"></span></a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
                <li><a href="o-nas.html">O nás</a></li>
            </ul>
        </nav>
    </header>

    <main class="search-results-page">
        <form class="hero-search" action="vyhledavani.html" method="get">
            <div class="hero-search-box">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M21 21l-4.35-4.35m1.85-5.65a7.5 7.5 0 11-15 0 7.5 7.5 0 0115 0z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <input type="text" id="search-input" name="q" placeholder="Co si dnes uvaříme?" aria-label="Vyhledávání receptů">
                <button type="submit">Hledat</button>
            </div>
        </form>

        <div id="results"></div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Kottyho kuchařka</p>
    </footer>

    <script>
        const params = new URLSearchParams(location.search);
        const query  = params.get('q') ?? '';

        document.getElementById('search-input').value = query;

        const results = document.getElementById('results');

        if (query === '') {
            results.innerHTML = '<h2>Zadejte hledaný výraz</h2>';
        } else {
            fetch('php/api/vyhledavani.php?q=' + encodeURIComponent(query))
                .then(r => r.json())
                .then(data => {
                    if (data.recipes.length === 0) {
                        results.innerHTML = `<h2>Výsledky pro: ${data.query}</h2><p class="search-subtitle">Bohužel jsme nic nenašli. Zkuste jiný výraz.</p>`;
                        return;
                    }
                    const count = data.recipes.length;
                    const word  = count === 1 ? 'recept' : (count < 5 ? 'recepty' : 'receptů');
                    results.innerHTML = `<h2>Výsledky pro: ${data.query}</h2>
                        <p class="search-subtitle">Našli jsme ${count} ${word}.</p>
                        <section class="recipes-grid">
                            ${data.recipes.map(r =>
                                `<a href="recept.html?slug=${encodeURIComponent(r.slug)}" class="recipe-card-link">
                                    <article class="recipe-card">
                                        <img src="${r.image}" alt="${r.name}">
                                        <div class="recipe-content">
                                            <h3>${r.name}</h3>
                                            <p>${r.description}</p>
                                            <div class="recipe-meta">
                                                <span>⏱ ${r.totalTime}</span>
                                                <span>👥 ${r.servings} porcí</span>
                                                <span>⭐ ${r.difficulty ?? ''}</span>
                                            </div>
                                        </div>
                                    </article>
                                </a>`
                            ).join('')}
                        </section>`;
                });
        }

        fetch('php/api/oblibene.php')
            .then(r => r.json())
            .then(data => {
                if (data.count > 0) {
                    const badge = document.getElementById('fav-badge');
                    badge.textContent = data.count;
                    badge.style.display = '';
                }
            });
    </script>

</body>
</html>
